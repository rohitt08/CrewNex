services:
  server:
    build: ./Backend
    container_name: crewnex-server
    ports:
      - "8081:8081"
    env_file:
      - ./Backend/.env
    networks:
      - fullstack-net
    restart: unless-stopped

  client:
    build: ./Frontend
    container_name: crewnex-client
    ports:
      - "4001:4001"
    env_file:
      - ./Frontend/.env
    networks:
      - fullstack-net
    depends_on:
      - server
    restart: unless-stopped

networks:
  fullstack-net:
    driver: bridge

